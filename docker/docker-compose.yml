services:
  postgres:
    image: postgres:14
    container_name: parking-postgres
    environment:
      POSTGRES_DB: parking_db
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parking123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking -d parking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: parking-backend
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://parking:${POSTGRES_PASSWORD:-parking123}@postgres:5432/parking_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app

  agent-app:
    build:
      context: ../frontend/agent-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: parking-agent
    ports:
      - "3000:3000"
    depends_on:
      - backend

  client-app:
    build:
      context: ../frontend/client-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: parking-client
    ports:
      - "3001:3000"
    depends_on:
      - backend

  admin-app:
    build:
      context: ../frontend/admin-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: parking-admin
    ports:
      - "3002:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: parking-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - agent-app
      - client-app
      - admin-app

volumes:
  postgres_data:
